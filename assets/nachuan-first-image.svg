<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="800" viewBox="0 0 1600 800" role="img" aria-labelledby="title desc">
  <title id="title">纳川.skill · To be anyone, to be better you.</title>
  <desc id="desc">A GitHub README hero visual for Nachuan.skill, showing scattered ideas flowing into routed knowledge assets.</desc>
  <defs>
    <linearGradient id="river" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="0.52" stop-color="#0ea5a3"/>
      <stop offset="1" stop-color="#d99a32"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f3faf8"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-24%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#12343a" flood-opacity="0.12"/>
    </filter>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#dbe7e5" stroke-width="1" opacity="0.55"/>
    </pattern>
    <style>
      .font { font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif; }
      .mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; }
      .ink { fill: #10262b; }
      .muted { fill: #60777b; }
      .teal { fill: #0f766e; }
      .amber { fill: #b7791f; }
      .panel { fill: url(#panel); stroke: #d7e7e4; stroke-width: 1.4; }
      .line { stroke: #c9ddda; stroke-width: 1.4; fill: none; }
      .river { stroke: url(#river); stroke-width: 9; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .riverThin { stroke: url(#river); stroke-width: 3; fill: none; stroke-linecap: round; opacity: 0.7; }
    </style>
  </defs>

  <rect width="1600" height="800" rx="36" fill="#f8fbfa"/>
  <rect width="1600" height="800" rx="36" fill="url(#grid)" opacity="0.7"/>
  <path d="M0 680 C210 630 330 710 520 662 C720 612 866 544 1046 584 C1260 632 1378 714 1600 650 L1600 800 L0 800 Z" fill="#edf7f5"/>

  <g class="font">
    <g transform="translate(94 76)">
      <rect x="0" y="0" width="236" height="42" rx="21" fill="#eef9f6" stroke="#c7e7e1"/>
      <circle cx="25" cy="21" r="6" fill="#0f766e"/>
      <text x="45" y="27" class="mono" font-size="18" fill="#315c60">Claude Code Skill</text>

      <text x="0" y="130" font-size="88" font-weight="780" class="ink">纳川.skill</text>
      <text x="3" y="184" font-size="30" font-weight="650" class="teal">Distill Everything.skill</text>
      <text x="3" y="238" font-size="38" font-weight="720" class="ink">To be anyone,</text>
      <text x="3" y="288" font-size="38" font-weight="720" class="ink">to be better you.</text>

      <g transform="translate(3 332)">
        <text x="0" y="0" font-size="22" font-weight="760" fill="#0f766e">当想法很多，路径很少</text>
        <text x="0" y="36" font-size="22" font-weight="760" fill="#0f766e">当材料很多，结构还没来</text>
        <text x="0" y="72" font-size="22" font-weight="760" fill="#0f766e">当你要的不是总结，而是下一步</text>
      </g>

      <text x="3" y="596" font-size="18" class="muted">Inspired by Huashu's Nuwa Skill · refined through real work</text>
    </g>

    <path class="riverThin" d="M220 538 C405 514 520 488 695 416"/>
    <path class="riverThin" d="M342 590 C498 568 590 514 704 432"/>
    <path class="riverThin" d="M548 526 C626 502 678 468 727 432"/>
    <path class="river" d="M190 622 C405 604 578 515 758 404 C854 346 970 332 1068 362"/>

    <g transform="translate(94 546)" filter="url(#softShadow)">
      <rect width="610" height="60" rx="10" fill="#10262b"/>
      <text x="26" y="38" class="mono" font-size="20" fill="#b8fff0">npx skills add wilsondd-lab/nachuan</text>
    </g>

    <g transform="translate(700 292)" filter="url(#softShadow)">
      <circle cx="116" cy="116" r="112" fill="#ffffff" stroke="#cde4df" stroke-width="2"/>
      <circle cx="116" cy="116" r="72" fill="#ecfbf8" stroke="#9bd8cf" stroke-width="2"/>
      <text x="116" y="108" text-anchor="middle" font-size="34" font-weight="780" class="teal">纳川</text>
      <text x="116" y="142" text-anchor="middle" font-size="18" class="muted">scan · route · distill</text>
    </g>

    <g transform="translate(1006 86)" filter="url(#softShadow)">
      <rect width="494" height="600" rx="22" class="panel"/>
      <text x="34" y="58" font-size="20" font-weight="760" class="teal">FROM CHAOS TO PATH</text>
      <text x="34" y="91" class="mono muted" font-size="18">idea → structure → asset</text>

      <g transform="translate(34 132)">
        <rect width="426" height="82" rx="10" fill="#ffffff" stroke="#d8e8e5"/>
        <text x="24" y="35" font-size="25" font-weight="760" class="ink">01 · 把混沌变成选择</text>
        <text x="24" y="62" font-size="17" class="muted">材料画像 · 推荐路线 · 备选路径</text>
      </g>

      <g transform="translate(34 238)">
        <rect width="426" height="82" rx="10" fill="#ffffff" stroke="#d8e8e5"/>
        <text x="24" y="35" font-size="25" font-weight="760" class="ink">02 · 把想法变成路径</text>
        <text x="24" y="62" font-size="17" class="muted">精华萃取 · 结构拆解 · 知识提取 · 内容生成</text>
      </g>

      <g transform="translate(34 344)">
        <rect width="426" height="82" rx="10" fill="#ffffff" stroke="#d8e8e5"/>
        <text x="24" y="35" font-size="25" font-weight="760" class="ink">03 · 把输出变成资产</text>
        <text x="24" y="62" font-size="17" class="muted">Markdown · tags · wikilinks · route logs</text>
      </g>

      <g transform="translate(34 470)">
        <rect width="426" height="78" rx="10" fill="#10262b"/>
        <text x="24" y="32" class="mono" font-size="17" fill="#9ef4e6">[[route-log]]  [[knowledge]]  [[templates]]</text>
        <text x="24" y="58" class="mono" font-size="16" fill="#d8fffa">reusable work assets, not one-off answers</text>
      </g>
    </g>
  </g>
</svg>
